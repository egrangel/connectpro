<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="s2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180800"/>
      <stop offset="50%" stop-color="#2E1000"/>
      <stop offset="100%" stop-color="#1A0600"/>
    </linearGradient>
    <radialGradient id="s2glow" cx="68%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#C8880A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C8880A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s2flame-glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#E86010" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#E86010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s2flame-a" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8B0A0A"/>
      <stop offset="35%" stop-color="#C83010"/>
      <stop offset="70%" stop-color="#E87010"/>
      <stop offset="100%" stop-color="#F0C010"/>
    </linearGradient>
    <linearGradient id="s2flame-b" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C83010"/>
      <stop offset="55%" stop-color="#E88020"/>
      <stop offset="100%" stop-color="#F0D040"/>
    </linearGradient>
    <linearGradient id="s2flame-c" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E89020"/>
      <stop offset="100%" stop-color="#F8E050"/>
    </linearGradient>
    <!-- Star path helper -->
    <path id="s2star" d="M0,-10 L2.4,-3.3 9.5,-3.1 3.9,1.3 5.9,8.1 0,4 -5.9,8.1 -3.9,1.3 -9.5,-3.1 -2.4,-3.3Z"/>
  </defs>

  <!-- Background -->
  <rect width="1400" height="500" fill="url(#s2bg)"/>
  <rect width="1400" height="500" fill="url(#s2glow)"/>

  <!-- Flame ambient glow (right side) -->
  <ellipse cx="980" cy="340" rx="320" ry="250" fill="url(#s2flame-glow)"/>

  <!-- ═══ Large Central Flame (logo-inspired, dominant visual) ═══ -->
  <!-- Positioned center-right, large, flowing -->
  <g transform="translate(900, 480) scale(2.8)" opacity="0.72">
    <!-- Outer flame body (red-orange) -->
    <path d="M0,0 Q-18,-30 -12,-60 Q-6,-90 0,-118 Q6,-90 12,-60 Q18,-30 0,0Z
             M0,-20 Q-24,-55 -20,-88 Q-14,-118 -8,-140 Q0,-118 8,-140 Q14,-118 20,-88 Q24,-55 0,-20Z"
          fill="url(#s2flame-a)" opacity="0.9"/>
    <!-- Second flame layer (orange) -->
    <path d="M0,-10 Q-14,-42 -10,-72 Q-5,-100 0,-124 Q5,-100 10,-72 Q14,-42 0,-10Z" fill="url(#s2flame-b)" opacity="0.85"/>
    <!-- Inner flame core (gold) -->
    <path d="M0,-20 Q-8,-50 -5,-80 Q-2,-108 0,-128 Q2,-108 5,-80 Q8,-50 0,-20Z" fill="url(#s2flame-c)" opacity="0.9"/>
    <!-- Outer wisp left -->
    <path d="M-8,-30 Q-30,-60 -26,-90 Q-22,-118 -14,-138 Q-10,-112 -12,-86 Q-8,-58 -4,-40Z" fill="url(#s2flame-a)" opacity="0.55"/>
    <!-- Outer wisp right -->
    <path d="M8,-30 Q30,-60 26,-90 Q22,-118 14,-138 Q10,-112 12,-86 Q8,-58 4,-40Z" fill="url(#s2flame-a)" opacity="0.55"/>
  </g>

  <!-- Smaller accent flames -->
  <g transform="translate(1150, 500) scale(1.2)" opacity="0.35">
    <path d="M0,0 Q-10,-20 -8,-40 Q-4,-60 0,-76 Q4,-60 8,-40 Q10,-20 0,0Z" fill="url(#s2flame-a)"/>
    <path d="M0,-8 Q-6,-28 -4,-50 Q-2,-68 0,-80 Q2,-68 4,-50 Q6,-28 0,-8Z" fill="url(#s2flame-b)"/>
  </g>
  <g transform="translate(750, 500) scale(1.0)" opacity="0.25">
    <path d="M0,0 Q-8,-18 -6,-36 Q-3,-54 0,-68 Q3,-54 6,-36 Q8,-18 0,0Z" fill="url(#s2flame-a)"/>
  </g>

  <!-- ═══ People silhouettes at base (community) ═══ -->
  <g fill="#C8880A" opacity="0.38">
    <!-- Person 1 -->
    <circle cx="820" cy="408" r="14"/>
    <path d="M806,424 Q820,418 834,424 L840,470 Q820,478 800,470Z"/>
    <!-- Person 2 -->
    <circle cx="870" cy="400" r="16"/>
    <path d="M854,418 Q870,410 886,418 L894,468 Q870,478 846,468Z"/>
    <!-- Person 3 (center, larger) -->
    <circle cx="926" cy="396" r="18"/>
    <path d="M908,416 Q926,406 944,416 L954,472 Q926,484 898,472Z"/>
    <!-- Person 4 -->
    <circle cx="982" cy="400" r="16"/>
    <path d="M966,418 Q982,410 998,418 L1006,468 Q982,478 958,468Z"/>
    <!-- Person 5 -->
    <circle cx="1034" cy="408" r="14"/>
    <path d="M1020,424 Q1034,418 1048,424 L1054,470 Q1034,478 1014,470Z"/>
    <!-- Raised hands (celebration) -->
    <rect x="840" y="430" width="6" height="22" rx="3" transform="rotate(-22,843,441)"/>
    <rect x="896" y="422" width="7" height="24" rx="3" transform="rotate(-15,900,434)"/>
    <rect x="950" y="416" width="8" height="26" rx="3" transform="rotate(0,954,429)"/>
    <rect x="1004" y="422" width="7" height="24" rx="3" transform="rotate(15,1008,434)"/>
    <rect x="1056" y="430" width="6" height="22" rx="3" transform="rotate(22,1059,441)"/>
  </g>

  <!-- ═══ Star ratings (floating, right side) ═══ -->
  <!-- Row of 5 stars, large -->
  <g fill="#C8880A" opacity="0.55" transform="translate(1140, 140)">
    <use href="#s2star" transform="translate(0,0) scale(2.2)"/>
    <use href="#s2star" transform="translate(50,0) scale(2.2)"/>
    <use href="#s2star" transform="translate(100,0) scale(2.2)"/>
    <use href="#s2star" transform="translate(150,0) scale(2.2)"/>
    <use href="#s2star" transform="translate(200,0) scale(2.2)"/>
  </g>
  <!-- Smaller floating stars -->
  <g fill="#C8880A" opacity="0.30" transform="translate(1160, 192)">
    <use href="#s2star" transform="translate(0,0) scale(1.4)"/>
    <use href="#s2star" transform="translate(32,0) scale(1.4)"/>
    <use href="#s2star" transform="translate(64,0) scale(1.4)"/>
    <use href="#s2star" transform="translate(96,0) scale(1.4)"/>
    <use href="#s2star" transform="translate(128,0) scale(1.4)"/>
  </g>
  <!-- Even smaller -->
  <g fill="#4BBDD6" opacity="0.20" transform="translate(1170, 226)">
    <use href="#s2star" transform="translate(0,0) scale(1.0)"/>
    <use href="#s2star" transform="translate(24,0) scale(1.0)"/>
    <use href="#s2star" transform="translate(48,0) scale(1.0)"/>
    <use href="#s2star" transform="translate(72,0) scale(1.0)"/>
    <use href="#s2star" transform="translate(96,0) scale(1.0)"/>
  </g>

  <!-- ═══ Teal accent lines (left, diagonal pattern) ═══ -->
  <line x1="0" y1="380" x2="320" y2="120" stroke="#4BBDD6" stroke-width="1" opacity="0.10"/>
  <line x1="60" y1="420" x2="380" y2="160" stroke="#4BBDD6" stroke-width="1" opacity="0.08"/>
  <line x1="120" y1="460" x2="440" y2="200" stroke="#4BBDD6" stroke-width="1" opacity="0.06"/>

  <!-- Gold ring accent (echoing logo ring) -->
  <circle cx="980" cy="252" r="340" fill="none" stroke="#C8880A" stroke-width="2" opacity="0.12"/>
  <circle cx="980" cy="252" r="310" fill="none" stroke="#4BBDD6" stroke-width="1" opacity="0.10"/>

  <!-- Dot pattern background (subtle) -->
  <g fill="#C8880A" opacity="0.08">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="200" cy="80" r="3"/>
    <circle cx="300" cy="110" r="3"/>
    <circle cx="140" cy="200" r="3"/>
    <circle cx="240" cy="180" r="3"/>
    <circle cx="340" cy="210" r="3"/>
    <circle cx="100" cy="300" r="3"/>
    <circle cx="200" cy="280" r="3"/>
    <circle cx="300" cy="310" r="3"/>
    <circle cx="150" cy="390" r="3"/>
    <circle cx="250" cy="370" r="3"/>
    <circle cx="350" cy="400" r="3"/>
  </g>

  <!-- Subtle "Unidos" text watermark -->
  <text x="60" y="430" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#C8880A" opacity="0.04" letter-spacing="2">Unidos</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="493" width="1400" height="7" fill="#C8880A" opacity="0.65"/>
  <rect x="940" y="493" width="460" height="7" fill="#4BBDD6" opacity="0.45"/>
</svg>
